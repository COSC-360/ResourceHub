services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
    expose:
      - "3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/resourcehub
      - MONGODB_URI=mongodb://mongo:27017/resourcehub
      - ACCESS_TOKEN_SECRET_KEY=anyrandomstring
      - JWT_SECRET=anyrandomstring
      - CLIENT_ORIGIN=http://localhost:4000
      - PORT=3000
    command: npm run dev -- --legacy-watch
    depends_on:
      - mongo
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./server/uploads:/app/uploads

  client:
    build:
      context: ./client
    ports:
      - "4000:4000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: npm run dev -- --host 0.0.0.0 --port 4000
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongo_data: